<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع الصور الطويل</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
    scroll-behavior: smooth;
    text-align: center;
  }

  /* الجملة المنورة */
  h1 {
    font-size: 50px;
    margin-top: 50px;
    color: #ffeb3b;
    text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffeb3b;
  }

  /* فراغ طويل جدًا */
  .spacer {
    height: 1200px; /* تقدر تزود الرقم لو عايز الصفحة أطول */
  }

  .image-section {
    margin: 50px 0;
  }

  .image-section img {
    max-width: 80%;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
  }

  .caption {
    margin-top: 10px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
  }

  footer {
    margin-top: 50px;
    padding: 30px 0;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
